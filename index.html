<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>英単語クイズロック</title>

  <style>

    body {
      margin: 0;

      font-family: sans-serif;

      background: #111;
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;

      text-align: center;
    }

    h1 {
      margin-bottom: 40px;
    }

    #quiz {
      font-size: 2rem;

      margin-bottom: 30px;
    }

    input {
      width: 100%;

      padding: 15px;

      font-size: 1.2rem;

      border-radius: 10px;
      border: none;

      margin-bottom: 20px;

      box-sizing: border-box;
    }

    button {
      width: 100%;

      padding: 15px;

      font-size: 1.2rem;

      border: none;
      border-radius: 10px;

      cursor: pointer;

      margin-top: 10px;
    }

    #result {
      margin-top: 30px;

      font-size: 1.2rem;

      min-height: 80px;
    }

    #progress {
      margin-top: 20px;

      opacity: 0.8;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>英単語クイズ</h1>

    <div id="quiz"></div>

    <input
      id="answer"
      placeholder="日本語を入力"
    >

    <button onclick="check()">
      回答
    </button>

    <p id="result"></p>

    <p id="progress"></p>

    <div id="end"></div>

  </div>

  <script src="app.js"></script>

</body>

</html>
